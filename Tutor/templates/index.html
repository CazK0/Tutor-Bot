<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Python Tutor</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
</head>
<body>
<header>
<h1>🎓 My Python Tutor</h1>
<button class="assignment-btn" id="assignment-title" onclick="getNewTask()">↻ Generate New Task</button>
</header>
<div class="main-container">
<div class="code-panel">
<h2>📝 Your Code</h2>
<div class="task-box" id="task-desc">
Loading your first AI-generated task...
</div>
<textarea id="code-editor" spellcheck="false"></textarea>
<div class="terminal-container">
<div class="terminal-header">Terminal Output</div>
<div id="output-terminal">Downloading Python engine... please wait.</div>
</div>
<button class="run-btn" onclick="executePython()">▶ Run Code</button>
</div>
<div class="chat-panel">
<h2>💬 AI Tutor Assistant</h2>
<div class="chat-container">
<div id="messages"></div>
<div class="input-area">
<input type="text" id="user-input" placeholder="Ask the tutor a question...">
<button onclick="sendMessage()" class="send-btn">Send</button>
</div>
</div>
</div>
</div>
<script>
let pyodideReadyPromise = loadPyodide({
    stdout: (text) => {
        const terminal = document.getElementById("output-terminal");
        terminal.innerText += text + "\n";
        terminal.scrollTop = terminal.scrollHeight;
    },
    stderr: (text) => {
        const terminal = document.getElementById("output-terminal");
        terminal.innerText += "Error: " + text + "\n";
        terminal.scrollTop = terminal.scrollHeight;
    }
}).then(pyodide => {
    document.getElementById("output-terminal").innerText = "Python ready!\n";
    return pyodide;
});

async function executePython() {
    const code = document.getElementById("code-editor").value;
    const terminal = document.getElementById("output-terminal");
    const runBtn = document.querySelector(".run-btn");
    
    terminal.innerText = "";
    runBtn.innerText = "⏳ Running...";
    runBtn.disabled = true;

    try {
        let pyodide = await pyodideReadyPromise;
        await pyodide.runPythonAsync(code);
    } catch (err) {
        terminal.innerText += err.message + "\n";
    } finally {
        runBtn.innerText = "▶ Run Code";
        runBtn.disabled = false;
    }
}

async function getNewTask() {
    const titleBtn = document.getElementById("assignment-title");
    const descBox = document.getElementById("task-desc");
    const editor = document.getElementById("code-editor");
    const terminal = document.getElementById("output-terminal");

    titleBtn.innerText = "↻ Asking AI for a task...";
    descBox.innerText = "Generating a new Python challenge...";
    editor.value = "";
    terminal.innerText = "Python ready!\n";

    try {
        const response = await fetch("/generate_task");
        const data = await response.json();
        
        titleBtn.innerText = "↻ " + data.title + " (Click for new)";
        descBox.innerHTML = "<b>Task:</b> " + data.task;
        editor.value = data.starter_code;
    } catch (error) {
        descBox.innerText = "Failed to load task. Please try again.";
    }
}

window.onload = getNewTask;

async function sendMessage() {
    const inputField = document.getElementById("user-input");
    const message = inputField.value;
    if (!message) return;
    
    const editorContent = document.getElementById("code-editor").value;
    const terminalContent = document.getElementById("output-terminal").innerText;
    
    const combinedMessage = `User asks: '${message}'\n\nCurrent Code in Editor:\n${editorContent}\n\nCurrent Terminal Output:\n${terminalContent}`;
    
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML += `<div class="user-msg">${message}</div>`;
    inputField.value = "";
    
    const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: combinedMessage })
    });
    
    const data = await response.json();
    messagesDiv.innerHTML += `<div class="bot-msg">${data.response}</div>`;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
</script>
</body>
</html>
